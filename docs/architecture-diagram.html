<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuik Architecture Diagrams</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e14;
            --surface: #111822;
            --accent: #00E5FF;
            --accent-dim: rgba(0, 229, 255, 0.15);
            --text: #E8EAF0;
            --text-dim: #8A8F9C;
            --purple: #A78BFA;
            --green: #34D399;
            --orange: #F59E0B;
            --pink: #EC4899;
            --blue: #3B82F6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 40px 20px;
            min-height: 100vh;
        }
        h1 { font-size: 1.5rem; font-weight: 300; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; }
        .canvas-wrap {
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.05);
        }
        .label { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--text-dim); margin-top: 8px; letter-spacing: 0.1em; }
        .tip { font-size: 0.7rem; color: var(--text-dim); opacity: 0.6; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Zuik System Diagrams</h1>
    <div>
        <div class="canvas-wrap" id="how-container"></div>
        <div class="label">HOW IT WORKS</div>
    </div>
    <div>
        <div class="canvas-wrap" id="arch-container"></div>
        <div class="label">ARCHITECTURE</div>
    </div>
    <div class="tip">Right-click each canvas → Save Image As to export PNG for README</div>

<script>
const BG = [10, 14, 20];
const ACCENT = [0, 229, 255];
const PURPLE = [167, 139, 250];
const GREEN = [52, 211, 153];
const ORANGE = [245, 158, 11];
const PINK = [236, 72, 153];
const BLUE = [59, 130, 246];
const TEXT = [232, 234, 240];
const DIM = [138, 143, 156];
const SURFACE = [17, 24, 34];

// ─── HOW IT WORKS DIAGRAM ──────────────────────────────
const howSketch = (p) => {
    const W = 900, H = 360;
    let particles = [];
    let t = 0;

    p.setup = () => {
        const c = p.createCanvas(W, H);
        c.parent('how-container');
        p.textFont('Outfit');
        p.pixelDensity(2);
        for (let i = 0; i < 60; i++) {
            particles.push({ x: p.random(W), y: p.random(H), vx: p.random(-0.3, 0.3), vy: p.random(-0.2, 0.2), s: p.random(1, 3) });
        }
    };

    p.draw = () => {
        p.background(...BG);
        t += 0.005;

        // Mesh grid
        p.stroke(0, 229, 255, 10);
        p.strokeWeight(0.5);
        for (let x = 0; x < W; x += 40) p.line(x, 0, x, H);
        for (let y = 0; y < H; y += 40) p.line(0, y, W, y);

        // Floating particles
        p.noStroke();
        for (let pt of particles) {
            pt.x += pt.vx; pt.y += pt.vy;
            if (pt.x < 0 || pt.x > W) pt.vx *= -1;
            if (pt.y < 0 || pt.y > H) pt.vy *= -1;
            let alpha = 30 + 20 * p.sin(t * 2 + pt.x * 0.01);
            p.fill(0, 229, 255, alpha);
            p.circle(pt.x, pt.y, pt.s);
        }

        // Step boxes
        const steps = [
            { x: 80, label: '01', title: 'DESCRIBE', sub: 'Voice, text, or\ndrag blocks', color: PURPLE },
            { x: 320, label: '02', title: 'REVIEW', sub: 'Simulate fees,\nsafety checks', color: ACCENT },
            { x: 560, label: '03', title: 'EXECUTE', sub: 'Atomic txns on\nAlgorand', color: GREEN },
        ];

        for (let s of steps) {
            let bx = s.x, by = 100, bw = 180, bh = 140;
            let glow = 8 + 4 * p.sin(t * 3 + s.x * 0.01);

            // Glow
            p.noStroke();
            p.fill(s.color[0], s.color[1], s.color[2], 8);
            p.rect(bx - glow, by - glow, bw + glow * 2, bh + glow * 2, 16);

            // Box
            p.fill(...SURFACE, 220);
            p.stroke(s.color[0], s.color[1], s.color[2], 60);
            p.strokeWeight(1);
            p.rect(bx, by, bw, bh, 12);

            // Top accent line
            p.noStroke();
            p.fill(s.color[0], s.color[1], s.color[2], 180);
            p.rect(bx, by, bw, 2, 12, 12, 0, 0);

            // Step number
            p.fill(s.color[0], s.color[1], s.color[2], 100);
            p.textSize(11);
            p.textStyle(p.NORMAL);
            p.textFont('IBM Plex Mono');
            p.textAlign(p.LEFT);
            p.text(s.label, bx + 16, by + 28);

            // Title
            p.fill(...TEXT);
            p.textSize(16);
            p.textStyle(p.BOLD);
            p.textFont('Outfit');
            p.text(s.title, bx + 16, by + 54);

            // Subtitle
            p.fill(...DIM);
            p.textSize(11);
            p.textStyle(p.NORMAL);
            let lines = s.sub.split('\n');
            for (let i = 0; i < lines.length; i++) {
                p.text(lines[i], bx + 16, by + 76 + i * 16);
            }
        }

        // Connecting arrows
        drawArrow(p, 264, 170, 316, 170, ACCENT);
        drawArrow(p, 504, 170, 556, 170, ACCENT);

        // Bottom labels
        p.textAlign(p.CENTER);
        p.textSize(9);
        p.textFont('IBM Plex Mono');
        p.fill(...DIM, 150);
        p.text('AI INTENT ENGINE', 170, 270);
        p.text('TRANSACTION SIMULATOR', 410, 270);
        p.text('ALGORAND BLOCKCHAIN', 650, 270);

        // Small icons below each
        p.fill(PURPLE[0], PURPLE[1], PURPLE[2], 40);
        p.noStroke();
        p.circle(170, 290, 24);
        p.fill(ACCENT[0], ACCENT[1], ACCENT[2], 40);
        p.circle(410, 290, 24);
        p.fill(GREEN[0], GREEN[1], GREEN[2], 40);
        p.circle(650, 290, 24);

        // Top tagline
        p.textAlign(p.CENTER);
        p.fill(...ACCENT, 120);
        p.textSize(10);
        p.textFont('IBM Plex Mono');
        p.text('VOICE  /  TEXT  /  DRAG & DROP', W / 2, 50);

        // Bottom tagline
        p.fill(...DIM, 80);
        p.textSize(9);
        p.text('ALL-OR-NOTHING EXECUTION  ·  SUB-5s FINALITY  ·  NON-CUSTODIAL', W / 2, 330);
    };
};

// ─── ARCHITECTURE DIAGRAM ──────────────────────────────
const archSketch = (p) => {
    const W = 900, H = 600;
    let t = 0;
    let particles = [];

    p.setup = () => {
        const c = p.createCanvas(W, H);
        c.parent('arch-container');
        p.textFont('Outfit');
        p.pixelDensity(2);
        for (let i = 0; i < 40; i++) {
            particles.push({ x: p.random(W), y: p.random(H), vx: p.random(-0.2, 0.2), vy: p.random(-0.15, 0.15), s: p.random(1, 2.5) });
        }
    };

    p.draw = () => {
        p.background(...BG);
        t += 0.004;

        // Mesh grid
        p.stroke(0, 229, 255, 6);
        p.strokeWeight(0.5);
        for (let x = 0; x < W; x += 40) p.line(x, 0, x, H);
        for (let y = 0; y < H; y += 40) p.line(0, y, W, y);

        // Particles
        p.noStroke();
        for (let pt of particles) {
            pt.x += pt.vx; pt.y += pt.vy;
            if (pt.x < 0 || pt.x > W) pt.vx *= -1;
            if (pt.y < 0 || pt.y > H) pt.vy *= -1;
            p.fill(0, 229, 255, 20 + 15 * p.sin(t * 2 + pt.x * 0.01));
            p.circle(pt.x, pt.y, pt.s);
        }

        // ─── Frontend Layer ─────────────────────
        drawBox(p, 40, 30, 820, 280, 'FRONTEND', ACCENT, t);

        // Sub-boxes inside frontend
        let modules = [
            { x: 70, y: 80, w: 160, h: 80, title: 'Visual Flow\nBuilder', sub: '@xyflow/react', color: PURPLE },
            { x: 260, y: 80, w: 160, h: 80, title: 'AI Chat &\nVoice UI', sub: 'Groq + Web Speech', color: ACCENT },
            { x: 450, y: 80, w: 160, h: 80, title: 'Dashboard &\nMonitoring', sub: 'Recharts + Supabase', color: GREEN },
            { x: 640, y: 80, w: 190, h: 80, title: 'Wallet\nIntegration', sub: '@txnlab/use-wallet', color: ORANGE },
        ];

        for (let m of modules) {
            let glow = 4 + 2 * p.sin(t * 2 + m.x * 0.01);
            p.noStroke();
            p.fill(m.color[0], m.color[1], m.color[2], 6);
            p.rect(m.x - glow, m.y - glow, m.w + glow * 2, m.h + glow * 2, 10);

            p.fill(...SURFACE, 200);
            p.stroke(m.color[0], m.color[1], m.color[2], 40);
            p.strokeWeight(1);
            p.rect(m.x, m.y, m.w, m.h, 8);

            p.noStroke();
            p.fill(m.color[0], m.color[1], m.color[2], 160);
            p.rect(m.x, m.y, m.w, 2, 8, 8, 0, 0);

            p.fill(...TEXT, 220);
            p.textAlign(p.CENTER);
            p.textSize(12);
            p.textStyle(p.BOLD);
            let lines = m.title.split('\n');
            for (let i = 0; i < lines.length; i++) {
                p.text(lines[i], m.x + m.w / 2, m.y + 30 + i * 16);
            }
            p.fill(...DIM, 140);
            p.textSize(8.5);
            p.textFont('IBM Plex Mono');
            p.textStyle(p.NORMAL);
            p.text(m.sub, m.x + m.w / 2, m.y + m.h - 14);
            p.textFont('Outfit');
        }

        // Middle processing layer
        let midBoxes = [
            { x: 120, y: 200, w: 180, h: 50, title: 'Intent Engine', sub: 'NLP → Workflow', color: PURPLE },
            { x: 360, y: 200, w: 180, h: 50, title: 'Workflow Executor', sub: 'Topological Sort', color: ACCENT },
            { x: 600, y: 200, w: 180, h: 50, title: 'Txn Composer', sub: 'Simulate + Safety', color: GREEN },
        ];

        for (let m of midBoxes) {
            p.fill(...SURFACE, 180);
            p.stroke(m.color[0], m.color[1], m.color[2], 30);
            p.strokeWeight(1);
            p.rect(m.x, m.y, m.w, m.h, 8);

            p.noStroke();
            p.fill(...TEXT, 200);
            p.textAlign(p.CENTER);
            p.textSize(11);
            p.textStyle(p.BOLD);
            p.text(m.title, m.x + m.w / 2, m.y + 22);
            p.fill(...DIM, 120);
            p.textSize(8);
            p.textFont('IBM Plex Mono');
            p.textStyle(p.NORMAL);
            p.text(m.sub, m.x + m.w / 2, m.y + 40);
            p.textFont('Outfit');
        }

        // Arrows between mid boxes
        drawArrow(p, 304, 225, 356, 225, PURPLE);
        drawArrow(p, 544, 225, 596, 225, ACCENT);

        // ─── External Services ──────────────────
        let extY = 360;
        let externals = [
            { x: 60, w: 160, title: 'Algorand\nTestNet', sub: 'via Nodely', color: GREEN },
            { x: 260, w: 160, title: 'Supabase', sub: 'Persistence', color: BLUE },
            { x: 460, w: 160, title: 'DEX Layer', sub: 'Folks Router + Tinyman', color: ACCENT },
            { x: 660, w: 160, title: 'Saber Money', sub: 'Fiat On/Off-Ramp', color: ORANGE },
        ];

        for (let e of externals) {
            let glow = 3 + 2 * p.sin(t * 1.5 + e.x * 0.01);
            p.noStroke();
            p.fill(e.color[0], e.color[1], e.color[2], 5);
            p.rect(e.x - glow, extY - glow, e.w + glow * 2, 80 + glow * 2, 10);

            p.fill(...SURFACE, 180);
            p.stroke(e.color[0], e.color[1], e.color[2], 35);
            p.strokeWeight(1);
            p.rect(e.x, extY, e.w, 80, 8);

            p.noStroke();
            p.fill(e.color[0], e.color[1], e.color[2], 140);
            p.rect(e.x, extY, e.w, 2, 8, 8, 0, 0);

            p.fill(...TEXT, 200);
            p.textAlign(p.CENTER);
            p.textSize(12);
            p.textStyle(p.BOLD);
            let lines = e.title.split('\n');
            for (let i = 0; i < lines.length; i++) {
                p.text(lines[i], e.x + e.w / 2, extY + 28 + i * 16);
            }
            p.fill(...DIM, 130);
            p.textSize(8);
            p.textFont('IBM Plex Mono');
            p.textStyle(p.NORMAL);
            p.text(e.sub, e.x + e.w / 2, extY + 65);
            p.textFont('Outfit');
        }

        // Connecting lines from frontend to externals
        p.stroke(0, 229, 255, 20);
        p.strokeWeight(1);
        drawDashedLine(p, 140, 314, 140, extY);
        drawDashedLine(p, 340, 314, 340, extY);
        drawDashedLine(p, 540, 314, 540, extY);
        drawDashedLine(p, 740, 314, 740, extY);

        // ─── Server Agent ───────────────────────
        let srvY = 490;
        p.fill(...SURFACE, 160);
        p.stroke(PINK[0], PINK[1], PINK[2], 30);
        p.strokeWeight(1);
        p.rect(60, srvY, 820, 70, 10);

        p.noStroke();
        p.fill(PINK[0], PINK[1], PINK[2], 140);
        p.rect(60, srvY, 820, 2, 10, 10, 0, 0);

        p.fill(...TEXT, 180);
        p.textAlign(p.LEFT);
        p.textSize(12);
        p.textStyle(p.BOLD);
        p.text('SERVER AGENT', 86, srvY + 28);

        p.fill(...DIM, 140);
        p.textSize(9);
        p.textFont('IBM Plex Mono');
        p.textStyle(p.NORMAL);
        p.text('Node.js  ·  Telegram Bot  ·  Price Monitor  ·  Scheduled Execution  ·  Notifications', 86, srvY + 48);
        p.textFont('Outfit');

        // Zuik logo text
        p.textAlign(p.RIGHT);
        p.fill(...ACCENT, 60);
        p.textSize(10);
        p.textFont('IBM Plex Mono');
        p.text('ZUIK', W - 50, H - 16);
    };
};

// ─── Helpers ────────────────────────────────────────
function drawArrow(p, x1, y1, x2, y2, col) {
    let pulse = 0.6 + 0.4 * p.sin(p.millis() * 0.003 + x1 * 0.01);
    p.stroke(col[0], col[1], col[2], 80 * pulse);
    p.strokeWeight(1.5);
    p.line(x1, y1, x2, y2);
    let angle = p.atan2(y2 - y1, x2 - x1);
    p.fill(col[0], col[1], col[2], 100 * pulse);
    p.noStroke();
    p.push();
    p.translate(x2, y2);
    p.rotate(angle);
    p.triangle(0, 0, -8, -4, -8, 4);
    p.pop();
}

function drawDashedLine(p, x1, y1, x2, y2) {
    let d = p.dist(x1, y1, x2, y2);
    let dashLen = 6, gapLen = 4;
    let steps = d / (dashLen + gapLen);
    for (let i = 0; i < steps; i++) {
        let t1 = i / steps;
        let t2 = p.min((i * (dashLen + gapLen) + dashLen) / d, 1);
        p.line(p.lerp(x1, x2, t1), p.lerp(y1, y2, t1), p.lerp(x1, x2, t2), p.lerp(y1, y2, t2));
    }
}

function drawBox(p, x, y, w, h, title, color, t) {
    let glow = 6 + 3 * p.sin(t * 1.5);
    p.noStroke();
    p.fill(color[0], color[1], color[2], 4);
    p.rect(x - glow, y - glow, w + glow * 2, h + glow * 2, 14);

    p.fill(...SURFACE, 120);
    p.stroke(color[0], color[1], color[2], 25);
    p.strokeWeight(1);
    p.rect(x, y, w, h, 12);

    p.noStroke();
    p.fill(color[0], color[1], color[2], 120);
    p.textAlign(p.LEFT);
    p.textSize(9);
    p.textFont('IBM Plex Mono');
    p.textStyle(p.NORMAL);
    p.text(title, x + 14, y + 18);
    p.textFont('Outfit');
}

new p5(howSketch);
new p5(archSketch);
</script>
</body>
</html>
